# Claude Code session image — isolated terminal environment.
#
# Usage:
#   docker compose run --rm claude-session
#
# Drops into zsh as the non-root `dev` user. From there:
#   - Clone a repo: git clone <url>
#   - Lock down outbound traffic: sudo init-firewall.sh
#   - Start Claude Code: claude
#
# The build context is set to the repo root so the Dockerfile can share
# COPY paths with the devcontainer Dockerfile without modification.
services:
  claude-session:
    build:
      context: ../..
      # Shared with .devcontainer/claude-code — single source of truth for the image.
      dockerfile: .devcontainer/claude-code/Dockerfile
    stdin_open: true
    tty: true
    user: dev
    # Run setup.sh (Docker network + firewall) before dropping into the shell.
    # dev has passwordless sudo for setup.sh via /etc/sudoers.d/dev-scripts.
    command: /bin/sh -c "sudo /usr/local/bin/setup.sh && exec /bin/zsh"
    environment:
      DEVCONTAINER: "false"
      # Forward auth tokens from the host environment.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GH_CONTRIBUTE_TOKEN: ${GH_CONTRIBUTE_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GH_TOKEN: ${GH_TOKEN:-}
      # Docker network name — setup.sh falls back to gh-contribute-$(hostname) if unset.
      DOCKER_NETWORK: ${DOCKER_NETWORK:-}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Share host ~/.claude so OAuth sessions and settings carry over.
      - ${HOME}/.claude:/home/dev/.claude:cached
      # Persist shell history across container runs.
      - claude-session-history:/commandhistory

volumes:
  claude-session-history:
